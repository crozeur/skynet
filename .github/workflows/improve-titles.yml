name: Improve blog titles

on:
  push:
    branches:
      - main
    paths:
      - 'content/blog/**/*.mdx'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  improve-titles:
    runs-on: ubuntu-latest
    concurrency:
      group: blog-title-improve
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Fix mojibake & polish titles
        run: node scripts/improve-blog-titles.js

      - name: Commit improved titles
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add content/blog/*.mdx
          if git diff --cached --quiet; then
            echo "No title changes needed."
            exit 0
          fi

          git commit -m "chore(blog): auto-improve titles (mojibake fix + acronyms)"

          # Push with rebase retry
          for i in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; continue; }
            git push origin HEAD:main && echo "✅ Titles pushed" && exit 0
            echo "⚠️ Push failed (attempt $i)"
          done
          echo "❌ Push failed after retries"
          exit 1
