name: Build Blog & Deploy

on:
  schedule:
    # Exécute tous les mardis à 09:00 UTC (10:00 CET, 11:00 CEST)
    - cron: '0 9 * * 2'
  workflow_dispatch: # Permet de déclencher manuellement

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: blog-metadata-update
      cancel-in-progress: false
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fix h3 formatting in articles
        run: node scripts/fix-h3-formatting.js
      
      - name: Run blog build
        run: npm run build:blog:dev
      
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add content/blog/ public/blog-data/
          if git diff --cached --quiet; then
            echo "✅ No changes to commit"
          else
            git commit -m "🤖 Auto-generated: Blog articles compiled - $(date +'%Y-%m-%d %H:%M UTC')"

            for i in 1 2 3 4; do
              git fetch origin main || true
              git rebase origin/main || { git rebase --abort || true; echo "Rebase failed." ; }

              if git push origin HEAD:main; then
                echo "✅ Changes pushed to GitHub"
                exit 0
              fi
              echo "⚠️  Push failed (attempt $i). Retrying..."
              sleep 5
            done
            echo "❌ Push failed after retries"
            exit 1
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
